<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Edit Data Mahasiswa - EduPredict ANN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans p-6 md:p-12">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-lg border border-slate-200 p-6 md:p-8">
        <div class="flex items-center space-x-3 border-b pb-4 mb-6">
            <i class="fas fa-user-edit text-emerald-600 text-2xl"></i>
            <h1 class="text-xl font-bold text-slate-800">Ubah Rekaman Mahasiswa</h1>
        </div>
        
        <form method="POST" class="space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">NIM Mahasiswa</label>
                    <input type="text" name="nim" value="{{ m['nim'] }}" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nama Lengkap</label>
                    <input type="text" name="nama" value="{{ m['nama'] }}" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-600">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Angkatan</label>
                    <input type="number" name="angkatan" value="{{ m['angkatan'] }}" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">IPK Saat Ini</label>
                    <input type="text" name="ipk" value="{{ m['ipk'] }}" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">MK Mengulang</label>
                    <input type="number" name="mk_mengulang" value="{{ m['mk_mengulang'] }}" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-600">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">SKS Diambil</label>
                    <input type="number" name="sks_diambil" value="{{ m['sks_diambil'] }}" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">SKS Lulus</label>
                    <input type="number" name="sks_lulus" value="{{ m['sks_lulus'] }}" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-600">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 border-t pt-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nama Orang Tua</label>
                    <input type="text" name="nama_ortu" value="{{ m['nama_ortu'] }}" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Kontak Orang Tua</label>
                    <input type="text" name="kontak_ortu" value="{{ m['kontak_ortu'] }}" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-600">
                </div>
            </div>

            <div class="border-t pt-4">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Hasil Klasifikasi AI</label>
                <select name="hasil_prediksi" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-600">
                    <option value="RENDAH" {% if m['hasil_prediksi'] == 'RENDAH' or m['hasil_prediksi'] == 'Rendah' %}selected{% endif %}>RENDAH</option>
                    <option value="SEDANG" {% if m['hasil_prediksi'] == 'SEDANG' or m['hasil_prediksi'] == 'Sedang' %}selected{% endif %}>SEDANG</option>
                    <option value="TINGGI" {% if m['hasil_prediksi'] == 'TINGGI' or m['hasil_prediksi'] == 'Tinggi' %}selected{% endif %}>TINGGI</option>
                </select>
            </div>

            <div class="flex items-center space-x-2 pt-4">
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-5 py-2.5 rounded-xl text-sm transition shadow-sm">
                    Simpan Perubahan
                </button>
                <a href="/dashboard" class="bg-white border border-slate-300 text-slate-700 font-semibold px-5 py-2.5 rounded-xl text-sm transition hover:bg-slate-50">
                    Batal
                </a>
            </div>
        </form>
    </div>
</body>
</html>
