<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Lupa Password - EduPredict ANN</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-md max-w-md w-full border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-800 mb-2 text-center">Pemulihan Akun</h2>
        <p class="text-sm text-slate-500 mb-6 text-center">Masukkan email admin terdaftar untuk menerima kode verifikasi OTP aman.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-4 mb-4 text-sm rounded-lg bg-{{ 'emerald' if category == 'success' else 'rose' }}-50 text-{{ 'emerald' if category == 'success' else 'rose' }}-700 border border-{{ 'emerald' if category == 'success' else 'rose' }}-200">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('forgot_password') }}" method="POST">
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Alamat Email Admin</label>
                <input type="email" name="email" required placeholder="ariskavina070@gmail.com" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-emerald-500 transition-colors">
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl transition-colors cursor-pointer">Kirim Kode Verifikasi</button>
        </form>
        <div class="mt-6 text-center">
            <a href="{{ url_for('login') }}" class="text-sm text-slate-500 hover:text-emerald-600 transition-colors">← Kembali ke Halaman Login</a>
        </div>
    </div>
</body>
</html>
