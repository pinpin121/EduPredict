<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Verifikasi OTP - EduPredict ANN</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-md max-w-md w-full border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-800 mb-2 text-center">Verifikasi OTP</h2>
        <p class="text-sm text-slate-500 mb-6 text-center">Masukkan 6-digit kode keamanan yang baru saja kami kirimkan ke email Anda.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-4 mb-4 text-sm rounded-lg bg-rose-50 text-rose-700 border border-rose-200">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('verify_otp') }}" method="POST">
            <div class="mb-6">
                <label class="block text-sm font-semibold text-slate-700 mb-2 text-center">Kode Rahasia OTP</label>
                <input type="text" name="otp" required maxlength="6" placeholder="000000" class="w-full text-center tracking-widest text-2xl font-mono px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-emerald-500 transition-colors">
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl transition-colors cursor-pointer">Verifikasi Kode</button>
        </form>
    </div>
</body>
</html>
