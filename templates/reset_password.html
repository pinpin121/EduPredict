<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Perbarui Password - EduPredict ANN</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-md max-w-md w-full border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-800 mb-2 text-center">Ubah Password Baru</h2>
        <p class="text-sm text-slate-500 mb-6 text-center">Buat kombinasi kata sandi baru yang kuat untuk mengamankan data mahasiswa.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-4 mb-4 text-sm rounded-lg bg-rose-50 text-rose-700 border border-rose-200">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

       <form method="POST">
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Password Baru</label>
                <input type="password" name="password" required placeholder="••••••••" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-emerald-500 transition-colors">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Konfirmasi Password Baru</label>
                <input type="password" name="konfirmasi_password" required placeholder="••••••••" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-emerald-500 transition-colors">
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl transition-colors cursor-pointer">Simpan Password Baru</button>
        </form>
    </div>
</body>
</html>
